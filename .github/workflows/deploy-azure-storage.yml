name: Deploy to Azure Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-azure-storage-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: ${{ vars.PROD_VITE_API_BASE_URL }}
      VITE_AUTH0_DOMAIN: ${{ vars.PROD_VITE_AUTH0_DOMAIN }}
      VITE_AUTH0_CLIENT_ID: ${{ vars.PROD_VITE_AUTH0_CLIENT_ID }}
      AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required deployment variables
        run: |
          set -e
          missing=0
          for key in AZURE_STORAGE_ACCOUNT_NAME VITE_API_BASE_URL VITE_AUTH0_DOMAIN VITE_AUTH0_CLIENT_ID; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "::error::$key is not set. Configure repository variables before deployment."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure static website is enabled
        run: |
          az storage blob service-properties update \
            --account-name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Remove previous website content
        run: |
          az storage blob delete-batch \
            --account-name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --auth-mode login \
            --source '$web'

      - name: Upload website content
        run: |
          az storage blob upload-batch \
            --account-name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --auth-mode login \
            --source ./dist \
            --destination '$web' \
            --overwrite

      - name: Get deployed website URL
        run: |
          WEBSITE_URL=$(az storage account show \
            --name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --query "primaryEndpoints.web" \
            --output tsv)

          echo "Website URL: $WEBSITE_URL"
          echo "website_url=$WEBSITE_URL" >> "$GITHUB_OUTPUT"

      - name: Configure Function App CORS (optional)
        if: ${{ env.AZURE_RESOURCE_GROUP != '' && env.AZURE_FUNCTION_APP_NAME != '' }}
        run: |
          WEBSITE_URL=$(az storage account show \
            --name "$AZURE_STORAGE_ACCOUNT_NAME" \
            --query "primaryEndpoints.web" \
            --output tsv)

          WEBSITE_ORIGIN=${WEBSITE_URL%/}

          az functionapp cors add \
            --name "$AZURE_FUNCTION_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --allowed-origins "$WEBSITE_ORIGIN"
